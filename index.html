<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LiC 3.0</title>

<link 
rel="icon" 
id="favicon"
href="https://i.postimg.cc/pVwGyq2c/C-2.png">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
width:100%;
height:100vh;
overflow:hidden;
}

/* TELA LOGIN */

#login{

width:100%;
height:100vh;

background-image:
url("https://i.postimg.cc/Z5NDdH29/Design-sem-nome-24.png");

background-size:cover;
background-position:center;
background-repeat:no-repeat;

display:flex;
justify-content:center;
align-items:center;

position:relative;

}

#login::before{

content:"";
position:absolute;
inset:0;

background:
rgba(0,0,0,.50);

backdrop-filter:
blur(5px);

}

.login-box{

width:380px;

padding:35px;

border-radius:28px;

background:
rgba(255,255,255,.95);

z-index:2;

position:relative;

text-align:center;

box-shadow:
0 15px 60px rgba(0,0,0,.4);

}

.logo{

width:90px;

border-radius:50%;

margin-bottom:15px;

}

h2{

color:#333;

margin-bottom:10px;

}

.sub{

color:#666;
font-size:14px;
margin-bottom:25px;

}

input{

width:100%;

padding:14px;

border-radius:14px;

border:1px solid #ddd;

outline:none;

font-size:15px;

}

input:focus{

border-color:#6a38ff;

}

button{

width:100%;

padding:14px;

margin-top:15px;

border:none;

border-radius:14px;

background:#6a38ff;

color:white;

font-size:15px;

cursor:pointer;

transition:.3s;

}

button:hover{

transform:scale(1.03);

}

#erro{

display:none;

color:red;

margin-top:15px;

}

#site{

display:none;

width:100%;
height:100vh;

}

iframe{

width:100%;
height:100%;

border:none;

}

</style>
</head>

<body>

<div id="login">

<div class="login-box">

<img
class="logo"
src="https://i.postimg.cc/pVwGyq2c/C-2.png">

<h2>LiC 3.0</h2>

<div class="sub">
Digite sua senha para acessar
</div>

<input
type="password"
id="senha"
placeholder="Digite a senha">

<button onclick="entrar()">
Entrar
</button>

<div id="erro">
Senha incorreta
</div>

</div>

</div>


<div id="site">

<iframe
src="https://licwick.netlify.app/"
allowfullscreen>
</iframe>

</div>


<script>

/* SENHA */

const senhaCorreta="Wick@20";

function entrar(){

let senha=
document
.getElementById("senha")
.value;

if(senha===senhaCorreta){

document
.getElementById("login")
.style.display="none";

document
.getElementById("site")
.style.display="block";

}else{

document
.getElementById("erro")
.style.display="block";

}

}


/* ENTER */

document
.getElementById("senha")
.addEventListener(
"keypress",
function(e){

if(e.key==="Enter"){

entrar();

}

});


/* FAVICON PISCANDO */

const icones=[

"https://i.postimg.cc/pVwGyq2c/C-2.png",

"https://i.postimg.cc/T1Rj1y4w/original-viko-(40).png"

];

let atual=0;

setInterval(()=>{

let favicon=
document.getElementById(
"favicon"
);

atual=
(atual+1)%2;

favicon.href=
icones[atual];

},700);

</script>

</body>
</html>
