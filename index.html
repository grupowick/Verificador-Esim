<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LiC 3.0</title>

<link rel="icon" href="https://i.postimg.cc/pVwGyq2c/C-2.png" type="image/png">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    width:100%;
    height:100vh;
}

/* Tela login */
#login{
    width:100%;
    height:100vh;

    background-image:url("https://i.postimg.cc/Z5NDdH29/Design-sem-nome-24.png");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    display:flex;
    justify-content:center;
    align-items:center;

    position:relative;
}

#login::before{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,.45);
    backdrop-filter:blur(4px);
}

.login-box{
    width:380px;
    padding:35px;
    border-radius:25px;

    background:rgba(255,255,255,.95);

    z-index:2;
    position:relative;

    text-align:center;

    box-shadow:
    0 15px 50px rgba(0,0,0,.35);
}

.logo{
    width:90px;
    border-radius:50%;
    margin-bottom:15px;
}

h2{
    color:#333;
}

.sub{
    margin-top:10px;
    margin-bottom:25px;
    color:#666;
    font-size:14px;
}

input{
    width:100%;
    padding:14px;

    border-radius:12px;
    border:1px solid #ddd;

    outline:none;
}

input:focus{
    border-color:#6a38ff;
}

button{
    width:100%;
    padding:14px;

    margin-top:15px;

    border:none;
    border-radius:12px;

    background:#6a38ff;
    color:white;

    cursor:pointer;
}

#erro{
    color:red;
    margin-top:15px;
    display:none;
}

#site{
    display:none;
    width:100%;
    height:100vh;
}

iframe{
    width:100%;
    height:100%;
    border:none;
}
</style>
</head>

<body>

<div id="login">

<div class="login-box">

<img
class="logo"
src="https://i.postimg.cc/pVwGyq2c/C-2.png">

<h2>LiC 2.0</h2>

<div class="sub">
Digite sua senha para acessar
</div>

<input
type="password"
id="senha"
placeholder="Digite sua senha">

<button onclick="entrar()">
Entrar
</button>

<div id="erro">
Senha incorreta
</div>

</div>

</div>

<div id="site">

<iframe
src="https://licwick.netlify.app/"
allowfullscreen>
</iframe>

</div>

<script>

const senhaCorreta="Wick@20"; // ALTERE AQUI

// Mantém apenas enquanto a aba estiver aberta
if(sessionStorage.getItem("logado")==="sim"){
    liberarSite();
}

function entrar(){

let senha=
document.getElementById("senha").value;

if(senha===senhaCorreta){

sessionStorage.setItem(
"logado",
"sim"
);

liberarSite();

}else{

document.getElementById("erro")
.style.display="block";

}

}

function liberarSite(){

document.getElementById("login")
.style.display="none";

document.getElementById("site")
.style.display="block";

}

document
.getElementById("senha")
.addEventListener(
"keypress",
function(e){

if(e.key==="Enter"){
entrar();
}

});

</script>

</body>
</html>
