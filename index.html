<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-sim Wick</title>
    <link rel="icon" id="favicon" href="https://i.postimg.cc/1zmWTfpF/original-viko-(45).png">
    
    <link rel="preload" as="image" href="https://i.postimg.cc/MZNjTtDG/fundo-telmo-(19).png">
    
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: Arial, sans-serif; 
        }

        body { 
            width: 100%; 
            height: 100vh; 
            overflow: hidden; 
        }

        /* TELA LOGIN */
        #login { 
            width: 100%; 
            height: 100vh; 
            /* OTIMIZAÇÃO: Cor escura temporária para evitar tela branca enquanto a imagem não carrega */
            background-color: #121214; 
            background-image: url("https://i.postimg.cc/MZNjTtDG/fundo-telmo-(19).png"); 
            background-size: cover; 
            background-position: center; 
            background-repeat: no-repeat; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            position: relative; 
        }

        #login::before { 
            content: ""; 
            position: absolute; 
            inset: 0; 
            background: rgba(0, 0, 0, .50); 
            backdrop-filter: blur(5px); 
        }

        .login-box { 
            width: 380px; 
            padding: 35px; 
            border-radius: 28px; 
            background: rgba(255, 255, 255, .95); 
            z-index: 2; 
            position: relative; 
            text-align: center; 
            box-shadow: 0 15px 60px rgba(0, 0, 0, .4); 
        }

        .logo { 
            width: 90px; 
            border-radius: 50%; 
            margin-bottom: 15px; 
        }

        h2 { 
            color: #333; 
            margin-bottom: 10px; 
        }

        .sub { 
            color: #666; 
            font-size: 14px; 
            margin-bottom: 25px; 
        }

        input { 
            width: 100%; 
            padding: 14px; 
            border-radius: 14px; 
            border: 1px solid #ddd; 
            outline: none; 
            font-size: 15px; 
        }

        input:focus { 
            border-color: #6a38ff; 
        }

        button { 
            width: 100%; 
            padding: 14px; 
            margin-top: 15px; 
            border: none; 
            border-radius: 14px; 
            background: #6a38ff; 
            color: white; 
            font-size: 15px; 
            cursor: pointer; 
            transition: .3s; 
        }

        button:hover { 
            transform: scale(1.03); 
        }

        #erro { 
            display: none; 
            color: red; 
            margin-top: 15px; 
        }
    </style>
</head>
<body>

    <div id="login">
        <div class="login-box">
            <img class="logo" src="https://i.postimg.cc/1zmWTfpF/original-viko-(45).png" alt="Logo">
            <h2>E-sim Wick</h2>
            <div class="sub">Digite sua senha para acessar</div>
            <input type="password" id="senha" placeholder="Digite a senha">
            <button onclick="entrar()">Entrar</button>
            <div id="erro">Senha incorreta</div>
        </div>
    </div>

    <script>
        /* CONFIGURAÇÃO DE ACESSO */
        const senhaCorreta = "Wick@20";
        const urlDestino = "https://onedrive.live.com/?cid=bcafdbd3ebe35e17&id=BCAFDBD3EBE35E17%21sbbd06608e2c34fbd8539d1b5a48f2fa4&resid=BCAFDBD3EBE35E17%21sbbd06608e2c34fbd8539d1b5a48f2fa4&ithint=folder&e=swlXQi&migratedtospo=true&redeem=aHR0cHM6Ly8xZHJ2Lm1zL2YvYy9iY2FmZGJkM2ViZTM1ZTE3L0lnQUladEM3dy1LOVQ0VTUwYldrankta0FSWG5QRFBabGVjQk1Hb2h2U3ZxZkJjP2U9c3dsWFFp&v=validatepermission";

        function entrar() {
            let senha = document.getElementById("senha").value;
            
            if (senha === senhaCorreta) {
                // Redireciona a janela atual para o OneDrive, evitando o bloqueio de iframe
                window.location.href = urlDestino;
            } else {
                document.getElementById("erro").style.display = "block";
            }
        }

        /* DISPARAR ENTRADA COM A TECLA ENTER */
        document.getElementById("senha").addEventListener("keypress", function(e) {
            if (e.key === "Enter") {
                entrar();
            }
        });

        /* EFEITO DE DIGITAÇÃO NO TÍTULO DA ABA */
        const textoCompleto = "E-sim";
        let indice = 0;
        let apagando = false;

        function animarTitulo() {
            if (!apagando) {
                document.title = textoCompleto.substring(0, indice + 1);
                indice++;
                
                if (indice === textoCompleto.length) {
                    apagando = true;
                    setTimeout(animarTitulo, 1500);
                    return;
                }
                setTimeout(animarTitulo, 300);
            } else {
                document.title = textoCompleto.substring(0, indice - 1);
                indice--;
                
                if (indice === 1) { 
                    apagando = false;
                    setTimeout(animarTitulo, 500);
                    return;
                }
                setTimeout(animarTitulo, 150);
            }
        }

        // Inicializa a animação do título
        animarTitulo();

        /* ALTERNAÇÃO CONTÍNUA DO FAVICON */
        const icones = [
            "https://i.postimg.cc/pVwGyq2c/C-2.png",
            "https://i.postimg.cc/1zmWTfpF/original-viko-(45).png"
        ];
        let atual = 0;

        setInterval(() => {
            let favicon = document.getElementById("favicon");
            atual = (atual + 1) % icones.length;
            favicon.href = icones[atual];
        }, 700);
    </script>

</body>
</html>
